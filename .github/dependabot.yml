version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react-three:
        patterns:
          - '@react-three/*'
          - 'three'
          - '@types/three'
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
